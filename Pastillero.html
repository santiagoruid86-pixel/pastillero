<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#FF69B4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mi Pastillero ♡" />
  <title>Mi Pastillero ♡ Hello Kitty</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink-light: #FFF0F5;
      --pink-soft: #FFB6C1;
      --pink-main: #FF69B4;
      --pink-dark: #E91E8C;
      --pink-deep: #C2185B;
      --red-heart: #FF4D6D;
      --white: #FFFFFF;
      --text-dark: #5D1A3A;
      --text-mid: #8B3A62;
      --shadow: rgba(233, 30, 140, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--pink-light);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--pink-main) 0%, var(--pink-dark) 100%);
      padding: 24px 20px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border-radius: 0 0 32px 32px;
      box-shadow: 0 8px 24px var(--shadow);
    }

    header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 120px; height: 120px;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -20px; left: -20px;
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }

    .kitty-svg {
      width: 90px;
      height: 90px;
      margin: 0 auto 12px;
      display: block;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    header h1 {
      color: white;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header p {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 600;
      margin-top: 4px;
    }

    .hearts-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }
    .hearts-row span { font-size: 16px; animation: pulse 1.5s ease-in-out infinite; }
    .hearts-row span:nth-child(2) { animation-delay: 0.3s; }
    .hearts-row span:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.25)} }

    /* ── NOTIFICATION BANNER ── */
    .notif-banner {
      margin: 16px 20px 0;
      background: white;
      border: 2px solid var(--pink-soft);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 12px var(--shadow);
    }
    .notif-banner .icon { font-size: 28px; flex-shrink: 0; }
    .notif-banner .text { flex: 1; }
    .notif-banner .text strong { font-size: 13px; display: block; color: var(--text-dark); }
    .notif-banner .text span { font-size: 11px; color: var(--text-mid); }
    .btn-enable {
      background: linear-gradient(135deg, var(--pink-main), var(--pink-dark));
      color: white;
      border: none;
      border-radius: 20px;
      padding: 8px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 3px 8px var(--shadow);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn-enable:active { transform: scale(0.95); }
    .notif-banner.granted { border-color: #a8e6cf; }
    .notif-banner.granted .btn-enable { background: linear-gradient(135deg, #56ab2f, #a8e063); }

    /* ── MAIN CONTENT ── */
    main { padding: 20px; }

    /* ── ADD PILL FORM ── */
    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px var(--shadow);
      border: 1.5px solid rgba(255,182,193,0.4);
    }

    .card h2 {
      font-size: 17px;
      font-weight: 800;
      color: var(--pink-dark);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-mid);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--pink-soft);
      border-radius: 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
      background: var(--pink-light);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--pink-main);
      background: white;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 6px;
    }
    .day-btn {
      aspect-ratio: 1;
      border: 2px solid var(--pink-soft);
      border-radius: 10px;
      background: var(--pink-light);
      font-family: 'Nunito', sans-serif;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-mid);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .day-btn.active {
      background: linear-gradient(135deg, var(--pink-main), var(--pink-dark));
      border-color: transparent;
      color: white;
      box-shadow: 0 3px 8px var(--shadow);
    }

    .btn-add {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--pink-main) 0%, var(--pink-dark) 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 20px var(--shadow);
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-add:active { transform: scale(0.97); box-shadow: 0 3px 10px var(--shadow); }

    /* ── PILL LIST ── */
    .pill-list { display: flex; flex-direction: column; gap: 12px; }

    .pill-item {
      background: white;
      border-radius: 18px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 12px var(--shadow);
      border: 1.5px solid rgba(255,182,193,0.3);
      position: relative;
      overflow: hidden;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

    .pill-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: linear-gradient(180deg, var(--pink-main), var(--pink-dark));
      border-radius: 18px 0 0 18px;
    }

    .pill-icon {
      width: 50px; height: 50px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .pill-info { flex: 1; min-width: 0; }
    .pill-info .pill-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pill-info .pill-time {
      font-size: 13px;
      font-weight: 700;
      color: var(--pink-dark);
      margin-top: 2px;
    }
    .pill-info .pill-days {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .pill-info .pill-days span {
      background: var(--pink-light);
      color: var(--pink-dark);
      border: 1px solid var(--pink-soft);
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 800;
    }

    .pill-actions { display: flex; flex-direction: column; gap: 6px; }
    .btn-delete {
      background: none;
      border: 2px solid #FFB6C1;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }
    .btn-delete:active { background: #ffe0e8; transform: scale(0.9); }

    .btn-taken {
      background: none;
      border: 2px solid #a8e6cf;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }
    .btn-taken.done { background: #d4f5e9; border-color: #56ab2f; }
    .btn-taken:active { transform: scale(0.9); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-mid);
    }
    .empty-state .big-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; font-weight: 700; }
    .empty-state small { font-size: 13px; color: var(--pink-main); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: linear-gradient(135deg, var(--pink-main), var(--pink-dark));
      color: white;
      padding: 14px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 800;
      box-shadow: 0 8px 24px rgba(233,30,140,0.4);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── DECORATIVE DOTS ── */
    .deco-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 24px 0 8px;
    }
    .deco-row span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--pink-soft);
      display: inline-block;
    }
    .deco-row span:nth-child(2) { background: var(--pink-main); width: 10px; height: 10px; }

    /* ── NEXT ALARM BADGE ── */
    .next-alarm {
      background: linear-gradient(135deg, #fff0f5, #ffe0ef);
      border: 2px solid var(--pink-soft);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .next-alarm .alarm-icon { font-size: 28px; }
    .next-alarm .alarm-text strong { font-size: 14px; color: var(--text-dark); display: block; }
    .next-alarm .alarm-text span { font-size: 12px; color: var(--text-mid); }

    footer {
      text-align: center;
      padding: 20px;
      color: var(--pink-main);
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <!-- Hello Kitty SVG inline -->
    <svg class="kitty-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Body -->
      <ellipse cx="100" cy="135" rx="55" ry="50" fill="white"/>
      <!-- Head -->
      <circle cx="100" cy="88" r="62" fill="white"/>
      <!-- Ears -->
      <ellipse cx="58" cy="38" rx="20" ry="22" fill="white"/>
      <ellipse cx="142" cy="38" rx="20" ry="22" fill="white"/>
      <!-- Inner ears -->
      <ellipse cx="58" cy="38" rx="11" ry="13" fill="#FFB6C1"/>
      <ellipse cx="142" cy="38" rx="11" ry="13" fill="#FFB6C1"/>
      <!-- Eyes -->
      <ellipse cx="80" cy="88" rx="8" ry="9" fill="#333"/>
      <ellipse cx="120" cy="88" rx="8" ry="9" fill="#333"/>
      <!-- Eye shine -->
      <circle cx="83" cy="84" r="3" fill="white"/>
      <circle cx="123" cy="84" r="3" fill="white"/>
      <!-- Nose -->
      <ellipse cx="100" cy="100" rx="5" ry="4" fill="#FF69B4"/>
      <!-- Whiskers left -->
      <line x1="30" y1="95" x2="88" y2="102" stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="30" y1="105" x2="88" y2="108" stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Whiskers right -->
      <line x1="170" y1="95" x2="112" y2="102" stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="170" y1="105" x2="112" y2="108" stroke="#ccc" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Bow -->
      <ellipse cx="145" cy="56" rx="16" ry="10" fill="#FF69B4" transform="rotate(-20,145,56)"/>
      <ellipse cx="165" cy="52" rx="16" ry="10" fill="#FF69B4" transform="rotate(20,165,52)"/>
      <circle cx="155" cy="53" r="8" fill="#E91E8C"/>
      <!-- Dress collar -->
      <path d="M60,130 Q100,115 140,130 L145,185 Q100,195 55,185 Z" fill="#FFB6C1"/>
      <!-- Dress buttons -->
      <circle cx="100" cy="148" r="5" fill="white"/>
      <circle cx="100" cy="165" r="5" fill="white"/>
      <!-- Arms -->
      <ellipse cx="48" cy="148" rx="14" ry="22" fill="white" transform="rotate(-15,48,148)"/>
      <ellipse cx="152" cy="148" rx="14" ry="22" fill="white" transform="rotate(15,152,148)"/>
    </svg>

    <h1>Mi Pastillero ♡</h1>
    <p>Tu recordatorio kawaii de medicamentos</p>
    <div class="hearts-row">
      <span>♡</span><span>🌸</span><span>♡</span>
    </div>
  </header>

  <!-- NOTIFICATION BANNER -->
  <div class="notif-banner" id="notifBanner">
    <div class="icon">🔔</div>
    <div class="text">
      <strong>Activa las notificaciones</strong>
      <span>Para recibir alertas de tus pastillas</span>
    </div>
    <button class="btn-enable" id="btnEnableNotif" onclick="requestNotifPermission()">Activar</button>
  </div>

  <main>
    <!-- ADD PILL CARD -->
    <div class="card">
      <h2>🌸 Agregar Pastilla</h2>

      <div class="form-group">
        <label>Nombre del medicamento</label>
        <input type="text" id="pillName" placeholder="Ej: Vitamina C, Anticonceptivo..." />
      </div>

      <div class="form-group">
        <label>Hora de toma</label>
        <input type="time" id="pillTime" />
      </div>

      <div class="form-group">
        <label>Días de la semana</label>
        <div class="days-grid" id="daysGrid">
          <button class="day-btn" data-day="0">Lu</button>
          <button class="day-btn" data-day="1">Ma</button>
          <button class="day-btn" data-day="2">Mi</button>
          <button class="day-btn" data-day="3">Ju</button>
          <button class="day-btn" data-day="4">Vi</button>
          <button class="day-btn" data-day="5">Sá</button>
          <button class="day-btn" data-day="6">Do</button>
        </div>
      </div>

      <div class="form-group">
        <label>Emoji del medicamento</label>
        <select id="pillEmoji">
          <option value="💊">💊 Pastilla</option>
          <option value="🌸">🌸 Flor (Anticonceptivo)</option>
          <option value="💉">💉 Inyección</option>
          <option value="🫀">🫀 Corazón (Cardio)</option>
          <option value="🧠">🧠 Mental</option>
          <option value="💤">💤 Para dormir</option>
          <option value="🌿">🌿 Vitaminas/Natural</option>
          <option value="🦋">🦋 Tiroides</option>
          <option value="🩺">🩺 General</option>
        </select>
      </div>

      <button class="btn-add" onclick="addPill()">
        ✨ Agregar recordatorio
      </button>
    </div>

    <!-- NEXT ALARM -->
    <div class="next-alarm" id="nextAlarmBox" style="display:none">
      <div class="alarm-icon">⏰</div>
      <div class="alarm-text">
        <strong id="nextAlarmName">—</strong>
        <span id="nextAlarmTime">Próxima alarma</span>
      </div>
    </div>

    <!-- PILL LIST -->
    <div class="card">
      <h2>🩷 Mis Recordatorios</h2>
      <div class="pill-list" id="pillList">
        <div class="empty-state">
          <div class="big-icon">🌸</div>
          <p>¡Aún no tienes pastillas!</p>
          <small>Agrega tu primer recordatorio arriba ♡</small>
        </div>
      </div>
    </div>

    <div class="deco-row">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </main>

  <footer>
    Hecho con 💖 · Mi Pastillero Hello Kitty
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    // ── DATA ──
    const DAY_NAMES = ['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
    const DAY_NAMES_FULL = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
    let pills = JSON.parse(localStorage.getItem('hk_pills') || '[]');
    let selectedDays = [];
    let checkInterval = null;

    // ── DAYS TOGGLE ──
    document.querySelectorAll('.day-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const d = parseInt(btn.dataset.day);
        if (selectedDays.includes(d)) {
          selectedDays = selectedDays.filter(x => x !== d);
          btn.classList.remove('active');
        } else {
          selectedDays.push(d);
          btn.classList.add('active');
        }
      });
    });

    // ── SAVE / LOAD ──
    function save() {
      localStorage.setItem('hk_pills', JSON.stringify(pills));
    }

    // ── NOTIFICATIONS ──
    function requestNotifPermission() {
      if (!('Notification' in window)) {
        showToast('❌ Tu navegador no soporta notificaciones');
        return;
      }
      Notification.requestPermission().then(p => {
        updateNotifBanner(p);
        if (p === 'granted') {
          showToast('🔔 ¡Notificaciones activadas! ♡');
        }
      });
    }

    function updateNotifBanner(permission) {
      const banner = document.getElementById('notifBanner');
      const btn = document.getElementById('btnEnableNotif');
      if (permission === 'granted') {
        banner.classList.add('granted');
        btn.textContent = '✓ Activas';
        btn.disabled = true;
        btn.style.opacity = '0.7';
        document.querySelector('#notifBanner .text strong').textContent = '¡Notificaciones activas!';
        document.querySelector('#notifBanner .text span').textContent = 'Recibirás alertas a tiempo ♡';
        document.querySelector('#notifBanner .icon').textContent = '✅';
      } else if (permission === 'denied') {
        banner.querySelector('.text strong').textContent = 'Notificaciones bloqueadas';
        banner.querySelector('.text span').textContent = 'Actívalas en configuración del navegador';
        btn.style.display = 'none';
      }
    }

    function sendNotification(pill) {
      if (Notification.permission === 'granted') {
        new Notification('🌸 ¡Hora de tu pastilla! ♡', {
          body: `Toma tu ${pill.name} ahora 💊`,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💊</text></svg>',
          badge: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🌸</text></svg>',
          tag: `pill-${pill.id}`,
          requireInteraction: true,
          vibrate: [200, 100, 200, 100, 200]
        });
        showToast(`🔔 ¡Hora de tomar ${pill.name}!`);
      }
    }

    // ── CHECK ALARMS ──
    function checkAlarms() {
      const now = new Date();
      // JS getDay(): 0=Sun, 1=Mon... we use 0=Mon..6=Sun
      const jsDay = now.getDay(); // 0=Dom
      const ourDay = jsDay === 0 ? 6 : jsDay - 1; // convert: Mon=0..Sun=6
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      const timeStr = `${hh}:${mm}`;

      pills.forEach(pill => {
        if (!pill.days.includes(ourDay)) return;
        if (pill.time !== timeStr) return;
        // Only fire once per minute
        const key = `fired_${pill.id}_${now.toDateString()}_${timeStr}`;
        if (!sessionStorage.getItem(key)) {
          sessionStorage.setItem(key, '1');
          sendNotification(pill);
        }
      });
    }

    // ── NEXT ALARM ──
    function updateNextAlarm() {
      if (pills.length === 0) {
        document.getElementById('nextAlarmBox').style.display = 'none';
        return;
      }
      const now = new Date();
      const jsDay = now.getDay();
      const ourDay = jsDay === 0 ? 6 : jsDay - 1;
      const currentMins = now.getHours() * 60 + now.getMinutes();

      let soonest = null;
      let soonestMins = Infinity;

      pills.forEach(pill => {
        for (let offset = 0; offset < 7; offset++) {
          const checkDay = (ourDay + offset) % 7;
          if (!pill.days.includes(checkDay)) continue;
          const [ph, pm] = pill.time.split(':').map(Number);
          const pillMins = ph * 60 + pm;
          let diff = offset * 1440 + pillMins - currentMins;
          if (offset === 0 && pillMins <= currentMins) diff += 7 * 1440;
          if (diff < soonestMins) {
            soonestMins = diff;
            soonest = { pill, day: checkDay, diff };
          }
        }
      });

      if (soonest) {
        const box = document.getElementById('nextAlarmBox');
        box.style.display = 'flex';
        const h = Math.floor(soonest.diff / 60);
        const m = soonest.diff % 60;
        let timeLabel = '';
        if (h > 0) timeLabel = `En ${h}h ${m}m (${DAY_NAMES_FULL[soonest.day]} a las ${soonest.pill.time})`;
        else timeLabel = `En ${m} minuto${m!==1?'s':''} (${soonest.pill.time})`;
        document.getElementById('nextAlarmName').textContent = soonest.pill.emoji + ' ' + soonest.pill.name;
        document.getElementById('nextAlarmTime').textContent = timeLabel;
      }
    }

    // ── ADD PILL ──
    function addPill() {
      const name = document.getElementById('pillName').value.trim();
      const time = document.getElementById('pillTime').value;
      const emoji = document.getElementById('pillEmoji').value;

      if (!name) { showToast('🌸 ¡Escribe el nombre del medicamento!'); return; }
      if (!time) { showToast('⏰ ¡Selecciona la hora!'); return; }
      if (selectedDays.length === 0) { showToast('📅 ¡Selecciona al menos un día!'); return; }

      const pill = {
        id: Date.now(),
        name,
        time,
        emoji,
        days: [...selectedDays].sort(),
        takenToday: false
      };
      pills.push(pill);
      save();
      renderPills();
      updateNextAlarm();

      // Reset form
      document.getElementById('pillName').value = '';
      document.getElementById('pillTime').value = '';
      document.getElementById('pillEmoji').value = '💊';
      selectedDays = [];
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));

      showToast('✨ ¡Recordatorio guardado! ♡');
    }

    // ── RENDER PILLS ──
    function renderPills() {
      const list = document.getElementById('pillList');
      if (pills.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="big-icon">🌸</div>
            <p>¡Aún no tienes pastillas!</p>
            <small>Agrega tu primer recordatorio arriba ♡</small>
          </div>`;
        return;
      }

      const today = new Date();
      const jsDay = today.getDay();
      const ourDay = jsDay === 0 ? 6 : jsDay - 1;

      list.innerHTML = pills.map(pill => {
        const dayBadges = pill.days.map(d => `<span>${DAY_NAMES[d]}</span>`).join('');
        const todayActive = pill.days.includes(ourDay);
        const bgColor = todayActive ? 'linear-gradient(135deg,#fff0f5,#ffe0ef)' : '#f9f9f9';
        const takenClass = pill.takenToday ? 'done' : '';
        return `
          <div class="pill-item" style="background:${bgColor}">
            <div class="pill-icon" style="background:linear-gradient(135deg,#FFB6C1,#FF69B4)">${pill.emoji}</div>
            <div class="pill-info">
              <div class="pill-name">${pill.name}</div>
              <div class="pill-time">⏰ ${pill.time}</div>
              <div class="pill-days">${dayBadges}</div>
            </div>
            <div class="pill-actions">
              <button class="btn-taken ${takenClass}" onclick="toggleTaken(${pill.id})" title="${pill.takenToday ? 'Tomada' : 'Marcar como tomada'}">${pill.takenToday ? '✅' : '🤍'}</button>
              <button class="btn-delete" onclick="deletePill(${pill.id})" title="Eliminar">🗑️</button>
            </div>
          </div>`;
      }).join('');
    }

    // ── TOGGLE TAKEN ──
    function toggleTaken(id) {
      const pill = pills.find(p => p.id === id);
      if (!pill) return;
      pill.takenToday = !pill.takenToday;
      save();
      renderPills();
      showToast(pill.takenToday ? '✅ ¡Pastilla tomada! ♡' : '🔄 Marcada como pendiente');
    }

    // ── DELETE PILL ──
    function deletePill(id) {
      pills = pills.filter(p => p.id !== id);
      save();
      renderPills();
      updateNextAlarm();
      showToast('🗑️ Recordatorio eliminado');
    }

    // ── TOAST ──
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── RESET TAKEN AT MIDNIGHT ──
    function checkMidnight() {
      const now = new Date();
      if (now.getHours() === 0 && now.getMinutes() === 0) {
        pills.forEach(p => p.takenToday = false);
        save();
        renderPills();
      }
    }

    // ── INIT ──
    (function init() {
      // Check notif permission
      if ('Notification' in window) {
        updateNotifBanner(Notification.permission);
      }

      renderPills();
      updateNextAlarm();

      // Check alarms every 30 seconds
      setInterval(checkAlarms, 30000);
      setInterval(updateNextAlarm, 60000);
      setInterval(checkMidnight, 60000);

      // Run immediately
      checkAlarms();
    })();
  </script>
</body>
</html>
